<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHONING SIMULATOR PRO 1-26</title>
    <style>
        :root { --bg: #000; --card: #111; --gold: #ffcc00; --text: #fff; --border: #222; --green: #00d4ff; --red: #ff4444; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; font-size: 12px; overflow-x: hidden; }
        
        .header-main { text-align: center; padding: 15px 0; border-bottom: 2px solid var(--gold); position: sticky; top: 0; background: var(--bg); z-index: 10000; }
        .header-main h1 { color: var(--gold); font-size: 25px; margin: 0; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .sub-status { color: var(--green); font-size: 14px; margin-top: 4px; display: block; text-transform: uppercase; font-weight: bold; }

        .nav { display: flex; background: #0a0a0a; padding: 2px; gap: 2px; }
        .nav button { flex: 1; padding: 14px 2px; border: none; background: #1a1a1a; color: #888; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; }
        .nav button.active { background: var(--gold); color: black; }

        .container { padding: 10px; max-width: 800px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); padding: 15px; margin-bottom: 10px; min-height: 480px; display: flex; flex-direction: column; border-radius: 8px; }

        label { color: var(--gold); font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input, select, textarea { background: #000; border: 1px solid #444; color: #fff; padding: 12px; font-size: 14px; width: 100%; border-radius: 6px; margin-bottom: 12px; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-bottom: 15px; }
        th { background: #1a1a1a; color: var(--gold); padding: 10px; font-size: 10px; border: 1px solid #222; text-align: left; }
        td { padding: 8px; border: 1px solid #222; position: relative; font-size: 13px; }

        .p-search { font-size: 11px !important; padding: 8px 4px !important; }
        .p-qta { font-size: 11px !important; padding: 8px 2px !important; text-align: center; }
        .p-prezzo { font-size: 11px !important; padding: 8px 2px !important; text-align: center; }

        .db-grid-row { display: grid; grid-template-columns: 2.2fr repeat(5, 1.1fr) 35px; gap: 2px; border-bottom: 1px solid #222; padding: 6px 0; align-items: center; }
        .db-grid-row input { font-size: 10px; padding: 8px 2px; border: 1px solid transparent; background: #0a0a0a; color: #fff; margin: 0; text-align: center; }
        .db-header-grid { display: grid; grid-template-columns: 2.2fr repeat(5, 1.1fr) 35px; gap: 2px; background: #1a1a1a; color: var(--gold); font-size: 9px; font-weight: bold; padding: 10px 0; text-align: center; border-radius: 4px 4px 0 0; }

        .suggest-box { position: absolute; top: 100%; left: 0; background: #1a1a1a; border: 1px solid var(--gold); width: 100%; z-index: 99999; max-height: 220px; overflow-y: auto; display: none; }
        .suggest-item { padding: 14px; cursor: pointer; border-bottom: 1px solid #333; font-size: 13px; color: #fff; }

        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 100%; font-weight: bold; margin-top: auto; cursor: pointer; font-size: 15px; text-transform: uppercase; border-radius: 6px; }
        .btn-small { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 10px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 12px; border-radius: 6px; }
        .btn-backup { background: #333; color: var(--text); border: 1px solid #555; padding: 14px; width: 48%; font-size: 11px; cursor: pointer; font-weight: bold; border-radius: 6px; }
        .btn-red-x { background: var(--red); color: white; border: none; padding: 2px 6px; font-size: 10px; font-weight: bold; cursor: pointer; border-radius: 3px; }

        .summary-bar { display: flex; justify-content: space-between; padding: 18px; background: #000; border: 2px solid var(--gold); margin-top: 15px; font-weight: bold; font-size: 18px; border-radius: 8px; }
        .hidden { display: none; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid var(--gold); border-radius: 8px; width: 100%; max-width: 500px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 20px var(--gold); }
        .modal-close { position: absolute; top: 10px; right: 10px; background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeModal()">CHIUDI</button>
        <div id="modal-body" style="margin-top:25px;"></div>
    </div>
</div>

<div class="header-main">
    <h1>PHONING SIMULATOR </h1>
    <span class="sub-status">Versione Marzo 1-26 </span>
</div>

<div class="nav">
    <button onclick="tab(this, 'sec-vendita')" class="active">VENDITA</button>
    <button onclick="tab(this, 'sec-clienti')">CLIENTI</button>
    <button onclick="tab(this, 'sec-archivio')">PRODOTTI</button>
    <button onclick="tab(this, 'sec-analisi')">ANALISI</button>
</div>

<div class="container">
    <div id="sec-vendita" class="section">
        <div class="card">
            <div style="display:flex; gap:10px;">
                <div style="flex:1.6; position:relative;">
                    <label>Cliente (promo)</label>
                    <input type="text" id="v-cliente-input" oninput="searchCliente(this.value)" placeholder="Cerca cliente..." autocomplete="off">
                    <div id="suggest-clienti" class="suggest-box"></div>
                </div>
                <div style="flex:1">
                    <label>Fascia</label>
                    <select id="v-fascia" onchange="updateAllPrices()">
                        <option value="7">pz 7 (4+3)</option><option value="15">pz 15 (7+8)</option><option value="20">pz 20 (10+10)</option><option value="36">pz 36 (17+19)</option><option value="67">pz 67 (28+39)</option>
                    </select>
                </div>
            </div>
            <div style="flex-grow: 1;">
                <table id="table-v">
                    <thead><tr><th style="width:40%">ARTICOLO</th><th style="width:30%">PREZZO €.</th><th style="width:15%">Q.TÀ</th><th style="width:15%">TOT</th><th style="width:6%"></th></tr></thead>
                    <tbody id="cart-body"></tbody>
                </table>
                <button class="btn-small" onclick="addRow()">+ AGGIUNGI RIGA PRODOTTO</button>
            </div>
            <div class="summary-bar">
                <span>Totale</span>
                <span style="color:var(--green)"><span id="tot-prezzo">0.00</span> €</span>
            </div>
            <button class="btn-gold" onclick="salvaOrdine()">REGISTRA VENDITA</button>
        </div>
    </div>

    <div id="sec-clienti" class="section hidden">
        <div class="card">
            <label id="cli-label">Nuovo Cliente</label>
            <input type="text" id="new-cliente-nome" placeholder="Cognome e Nome">
            <button class="btn-gold" onclick="salvaCliente()">SALVA CLIENTE</button>
            <label> I Tuoi Clienti</label>
            <div id="lista-clienti-box" style="border:1px solid #333; border-radius:6px; flex-grow:1; overflow-y:auto; background:#050505;"></div>
        </div>
    </div>

    <div id="sec-archivio" class="section hidden">
        <div class="card" style="padding: 5px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px; background:#1a1a1a; padding:12px; border-radius:6px;">
                <button class="btn-backup" onclick="openExportModal()" style="background:var(--green); color:black;">ESPORTA (COPIA TESTO)</button>
                <button class="btn-backup" onclick="openImportModal()" style="background:var(--gold); color:black;">IMPORTA (INCOLLA TESTO)</button>
            </div>
            <button class="btn-small" style="margin-bottom:10px;" onclick="dbAddRow()">+ AGGIUNGI NUOVO ARTICOLO</button>
            <div class="db-header-grid">
                <div>ARTICOLO</div><div>F 7</div><div>F 15</div><div>F 20</div><div>F 36</div><div>F 67</div><div></div>
            </div>
            <div id="db-body-grid" style="overflow-y:auto; flex-grow:1; max-height:500px; background:#000;"></div>
        </div>
    </div>

    <div id="sec-analisi" class="section hidden">
        <div class="card">
            <div id="analisi-riepilogo" style="color:var(--green); text-align:center; font-weight:bold; margin-bottom:20px; font-size:20px; padding:15px; border:2px solid var(--green); border-radius:8px;"></div>
            <table>
                <thead><tr><th style="width:15%">N.</th><th style="width:50%">CLIENTE</th><th style="width:25%">TOT</th><th style="width:10%"></th></tr></thead>
                <tbody id="anal-body"></tbody>
            </table>
            <button style="background:var(--red); color:#fff; border:none; padding:15px; width:100%; font-weight:bold; margin-top:auto; font-size:12px; border-radius:6px;" onclick="clearOrdini()">AZZERA STORICO</button>
        </div>
    </div>
</div>

    // CARICAMENTO CLIENTI E ORDINI DAL TUO JSON
    let dbProdotti = JSON.parse(localStorage.getItem('ps_prodotti')) || nativeProdotti;
    let dbClienti = JSON.parse(localStorage.getItem('ps_clienti')) || ["Carta Roberto ","De Zanna Bruno ","Pedol Enzo ","Longarone Fiere","Priori Gianni","De Bettin Emanuele"];
    let ordini = JSON.parse(localStorage.getItem('ps_ordini')) || [{"num":2,"id":1773740964869,"cliente":"De Zanna Bruno ","totale":"887.66","dettagli":[{"n":"Capaweiss Ultra \"Original\" 14 LT","p":"55.08","q":"8"},{"n":"Fungicid Traspirante Bianco Calibrato 14 lt","p":"63.86","q":"7"}]},{"num":1,"id":1773617316157,"cliente":"Carta Roberto ","totale":"1260.88","dettagli":[{"n":"Red Panda Fullpaint Super 14 Lt","p":"35.98","q":"16"},{"n":"Red Panda Profiweiss Be 12,5 lt","p":"34.26","q":"20"}]}];
    
    let curEditCliIdx = -1;

    function saveToStorage() {
        localStorage.setItem('ps_prodotti', JSON.stringify(dbProdotti));
        localStorage.setItem('ps_clienti', JSON.stringify(dbClienti));
        localStorage.setItem('ps_ordini', JSON.stringify(ordini));
    }

    function tab(btn, id) {
        document.querySelectorAll('.section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(id === 'sec-archivio') renderArchivio();
        if(id === 'sec-clienti') renderClienti();
        if(id === 'sec-analisi') renderAnalisi();
    }

    function openExportModal() {
        const data = { p: dbProdotti, c: dbClienti, o: ordini };
        const text = JSON.stringify(data);
        const html = `<h2 style="color:var(--gold)">Esporta Dati</h2><textarea id="copy-area" style="height:200px; font-size:10px;" readonly>${text}</textarea><button class="btn-gold" onclick="copyText()">COPIA TESTO</button>`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function copyText() { const area = document.getElementById('copy-area'); area.select(); document.execCommand("copy"); alert("Copiato!"); }
    function openImportModal() {
        const html = `<h2 style="color:var(--gold)">Importa Dati</h2><textarea id="import-area" style="height:200px; font-size:10px;" placeholder="Incolla qui..."></textarea><button class="btn-gold" onclick="processImport()">CARICA DATI</button>`;
        document.getElementById('modal-body').innerHTML = html;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function processImport() {
        try { const d = JSON.parse(document.getElementById('import-area').value); if(confirm("Sostituire tutto?")) { dbProdotti=d.p; dbClienti=d.c; ordini=d.o; saveToStorage(); location.reload(); } } catch(e) { alert("Errore JSON!"); }
    }

    function addRow() {
        const tr = document.createElement('tr');
        tr.className = "row-prod";
        tr.innerHTML = `<td><div style="position:relative"><input type="text" class="p-search" oninput="searchProd(this)" placeholder="Cerca..." autocomplete="off"><div class="suggest-box"></div></div></td>
            <td><input type="number" class="p-prezzo" step="0.01" oninput="calcRow(this)"></td>
            <td><input type="number" class="p-qta" value="1" oninput="calcRow(this)"></td>
            <td class="p-tot" style="color:var(--gold); text-align:right; font-weight:bold; font-size:11px;">0.00</td>
            <td style="text-align:center;"><button class="btn-red-x" onclick="removeRow(this)">X</button></td>`;
        document.getElementById('cart-body').appendChild(tr);
    }
    function removeRow(btn) { btn.closest('tr').remove(); calcTotale(); }
    function searchProd(el) {
        const box = el.nextElementSibling;
        const val = el.value.toLowerCase();
        const matches = dbProdotti.filter(p => p.nome.toLowerCase().includes(val));
        if (val && matches.length) {
            box.innerHTML = matches.map(p => `<div class="suggest-item" onclick="selectProd(this, ${dbProdotti.indexOf(p)})">${p.nome}</div>`).join('');
            box.style.display = 'block';
        } else box.style.display = 'none';
    }
    function selectProd(el, idx) {
        const p = dbProdotti[idx]; const row = el.closest('tr');
        row.querySelector('.p-search').value = p.nome; el.parentElement.style.display = 'none';
        const f = document.getElementById('v-fascia').value;
        row.querySelector('.p-prezzo').value = p['f'+f]; calcRow(row.querySelector('.p-prezzo'));
    }
    function calcRow(el) {
        const row = el.closest('tr');
        const p = parseFloat(row.querySelector('.p-prezzo').value) || 0;
        const q = parseFloat(row.querySelector('.p-qta').value) || 0;
        row.querySelector('.p-tot').innerText = (p * q).toFixed(2); calcTotale();
    }
    function calcTotale() {
        let t = 0; document.querySelectorAll('.row-prod .p-tot').forEach(el => t += parseFloat(el.innerText));
        document.getElementById('tot-prezzo').innerText = t.toFixed(2);
    }
    function salvaOrdine() {
        const c = document.getElementById('v-cliente-input').value; const t = document.getElementById('tot-prezzo').innerText;
        if(!c || t == "0.00") return;
        const items = [];
        document.querySelectorAll('.row-prod').forEach(r => {
            const name = r.querySelector('.p-search').value;
            if (name) items.push({ n: name, p: r.querySelector('.p-prezzo').value, q: r.querySelector('.p-qta').value });
        });
        ordini.unshift({ num: ordini.length + 1, id: Date.now(), cliente: c, totale: t, dettagli: items });
        saveToStorage(); document.getElementById('cart-body').innerHTML = ''; document.getElementById('v-cliente-input').value = '';
        calcTotale(); addRow(); alert("Vendita Registrata!");
    }
    function renderAnalisi() {
        let totGen = 0;
        document.getElementById('anal-body').innerHTML = ordini.map((o, i) => {
            totGen += parseFloat(o.totale);
            return `<tr onclick="openModalDetail(${i})" style="cursor:pointer"><td>${o.num}</td><td>${o.cliente}</td><td style="text-align:right;">${o.totale}€</td><td style="text-align:center;"><button class="btn-red-x" onclick="event.stopPropagation(); deleteOrdine(${i})">X</button></td></tr>`;
        }).join('');
        document.getElementById('analisi-riepilogo').innerText = "VENDUTO TOTALE: " + totGen.toFixed(2) + " €";
    }
    function openModalDetail(idx) {
        const o = ordini[idx];
        let h = `<h2 style="color:var(--gold)">Dettaglio Vendita</h2><p>Cliente: ${o.cliente}</p><table style="width:100%; font-size:11px;">`;
        o.dettagli.forEach(d => { h += `<tr><td>${d.n}</td><td>${d.p}€</td><td>x${d.q}</td></tr>`; });
        h += `</table><h3 style="color:var(--green)">Totale: ${o.totale}€</h3>`;
        document.getElementById('modal-body').innerHTML = h;
        document.getElementById('modal-overlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function deleteOrdine(idx) { if(confirm("Eliminare?")) { ordini.splice(idx, 1); saveToStorage(); renderAnalisi(); } }
    function clearOrdini() { if(confirm("Azzera tutto?")) { ordini = []; saveToStorage(); renderAnalisi(); } }
    function salvaCliente() {
        const val = document.getElementById('new-cliente-nome').value; if(!val) return;
        if(curEditCliIdx > -1) dbClienti[curEditCliIdx] = val; else dbClienti.push(val);
        document.getElementById('new-cliente-nome').value = ''; curEditCliIdx = -1;
        saveToStorage(); renderClienti();
    }
    function renderClienti() {
        document.getElementById('lista-clienti-box').innerHTML = dbClienti.map((c, i) => `<div style="padding:15px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;"><span>${c}</span><div><button onclick="editCliente(${i})" style="color:var(--gold); background:none; border:1px solid var(--gold); padding:5px 8px; font-size:10px; margin-right:5px;">EDIT</button><button onclick="deleteCliente(${i})" style="color:var(--red); background:none; border:1px solid var(--red); padding:5px 8px; font-size:10px;">X</button></div></div>`).join('');
    }
    function editCliente(idx) { curEditCliIdx = idx; document.getElementById('new-cliente-nome').value = dbClienti[idx]; document.getElementById('cli-label').innerText = "Modifica Cliente"; window.scrollTo(0,0); }
    function deleteCliente(idx) { if(confirm("Cancellare?")) { dbClienti.splice(idx, 1); saveToStorage(); renderClienti(); } }
    function searchCliente(v) {
        const box = document.getElementById('suggest-clienti');
        const m = dbClienti.filter(c => c.toLowerCase().includes(v.toLowerCase()));
        if(v && m.length) { box.innerHTML = m.map(c => `<div class="suggest-item" onclick="selectCli('${c}')">${c}</div>`).join(''); box.style.display = 'block'; } else box.style.display = 'none';
    }
    function selectCli(n) { document.getElementById('v-cliente-input').value = n; document.getElementById('suggest-clienti').style.display = 'none'; }
    function renderArchivio() {
        document.getElementById('db-body-grid').innerHTML = dbProdotti.map((p, i) => `<div class="db-grid-row"><input type="text" value="${p.nome}" oninput="updateProd(${i}, 'nome', this.value)" style="color:var(--gold); text-align:left; padding-left:5px;"><input type="number" step="0.01" value="${p.f7}" oninput="updateProd(${i}, 'f7', this.value)"><input type="number" step="0.01" value="${p.f15}" oninput="updateProd(${i}, 'f15', this.value)"><input type="number" step="0.01" value="${p.f20}" oninput="updateProd(${i}, 'f20', this.value)"><input type="number" step="0.01" value="${p.f36}" oninput="updateProd(${i}, 'f36', this.value)"><input type="number" step="0.01" value="${p.f67}" oninput="updateProd(${i}, 'f67', this.value)"><div style="text-align:center;"><button class="btn-red-x" onclick="deleteProd(${i})">X</button></div></div>`).join('');
    }
    function updateProd(idx, field, val) { dbProdotti[idx][field] = (field === 'nome') ? val : (parseFloat(val) || 0); saveToStorage(); }
    function dbAddRow() { dbProdotti.unshift({nome:"NUOVO", f7:0, f15:0, f20:0, f36:0, f67:0}); saveToStorage(); renderArchivio(); }
    function deleteProd(idx) { if(confirm("Eliminare?")) { dbProdotti.splice(idx, 1); saveToStorage(); renderArchivio(); } }
    function updateAllPrices() {
        const f = document.getElementById('v-fascia').value;
        document.querySelectorAll('.row-prod').forEach(row => {
            const n = row.querySelector('.p-search').value;
            const p = dbProdotti.find(x => x.nome === n);
            if(p) { row.querySelector('.p-prezzo').value = p['f'+f]; calcRow(row.querySelector('.p-prezzo')); }
        });
    }
    addRow();    // --- SISTEMA AUDIO GENERATIVO ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } 
        else if (type === 'success') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
        else if (type === 'delete') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }
    }

    // --- AGGIUNGI I SUONI ALLE TUE FUNZIONI ESISTENTI ---
    // Modifica le tue funzioni aggiungendo playSound dove serve:

    const originalTab = tab;
    tab = function(btn, id) { playSound('click'); originalTab(btn, id); };

    const originalSalvaOrdine = salvaOrdine;
    salvaOrdine = function() { 
        const t = document.getElementById('tot-prezzo').innerText;
        if(t !== "0.00") playSound('success'); 
        originalSalvaOrdine(); 
    };

    const originalDelete = deleteOrdine;
    deleteOrdine = function(idx) { 
        if(confirm("Eliminare?")) { playSound('delete'); originalDelete(idx); } 
    };
    
    // Inizializza audio al primo tocco (obbligatorio per i browser mobili)
    document.body.addEventListener('touchstart', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }, {once: true});

    addRow();

</script>
</body>
